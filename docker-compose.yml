services:
  database:
    image: 'postgres:latest'
    container_name: postgres-db
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - ${PWD}/db-data/:/home/germiesqui/mmo_backend-project/src/mmo_backend-project/postgresql/data/
    - ./scripts:/docker-entrypoint-initdb.d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "8080:8080"
    depends_on:
      - database
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 8080
    volumes:
      - ${PWD}/pgadmin-data/:/home/germiesqui/mmo_backend-project/src/mmo_backend-project/pgadmin/data
      - ./pgadmin-servers.json:/pgadmin4/servers.json
  redis:
    image: redis:8.6-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${PWD}/redis-data/:/home/germiesqui/mmo_backend-project/src/mmo_backend-project/redis/data